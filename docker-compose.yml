version: "3.9"

services:
  aggregator:
    build: .
    container_name: aggregator
    ports:
      - "8000:8000"
    networks:
      - app-network

  publisher:
    build: .
    container_name: publisher
    command: python publisher.py
    depends_on:
      - aggregator
    networks:
      - app-network

networks:
  app-network: